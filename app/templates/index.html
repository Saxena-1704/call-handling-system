<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: system-ui, sans-serif;
    }

    h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 2rem; color: #888; }

    /* Mic button */
    #btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #444;
      background: #1a1a1a;
      color: #f0f0f0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      outline: none;
      position: relative;
    }

    /* Pulsing ring shown while mic is on */
    #btn::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }

    #btn.ready    { border-color: #4a9eff; background: #0d1a2d; }
    #btn.ready::after { border-color: rgba(74,158,255,0.25); animation: pulse 2s ease-in-out infinite; }

    #btn.listening  { border-color: #e53e3e; background: #2d1111; }
    #btn.listening::after { border-color: rgba(229,62,62,0.4); animation: pulse 0.8s ease-in-out infinite; }

    #btn.thinking   { border-color: #d69e2e; background: #2d2211; }
    #btn.speaking   { border-color: #38a169; background: #112d1a; }

    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.12); opacity: 0.6; }
    }

    #status {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #666;
      min-height: 1.2em;
    }

    #transcript {
      margin-top: 2rem;
      max-width: 480px;
      width: 90%;
      text-align: left;
    }

    .turn { margin-bottom: 1rem; line-height: 1.5; font-size: 0.9rem; }
    .turn .label { font-size: 0.75rem; color: #555; margin-bottom: 0.2rem; }
    .turn.user .text  { color: #90cdf4; }
    .turn.ai   .text  { color: #9ae6b4; }
  </style>
</head>
<body>

<h1>Voice Assistant</h1>

<button id="btn">Start</button>
<div id="status">Click to start a conversation</div>

<div id="transcript"></div>

<script>
  const btn = document.getElementById('btn');
  const statusEl = document.getElementById('status');
  const transcriptEl = document.getElementById('transcript');

  // ── WebSocket ─────────────────────────────────────────────────────
  const ws = new WebSocket(`ws://${location.host}/ws/audio`);
  ws.binaryType = 'arraybuffer';

  ws.onopen  = () => {};
  ws.onclose = () => { setStatus('Disconnected'); setBtnState('idle'); };
  ws.onerror = () => { setStatus('Connection error'); setBtnState('idle'); };

  ws.onmessage = (event) => {
    if (typeof event.data === 'string') {
      const msg = JSON.parse(event.data);

      if (msg.type === 'vad_state') {
        // Server VAD tells us whether user is speaking
        if (micActive) {
          if (msg.speaking) {
            setBtnState('listening');
            setStatus('Listening…');
          } else if (btnState === 'listening') {
            // Back to ready — waiting for next speech
            setBtnState('ready');
            setStatus('Mic on — speak anytime');
          }
        }
      }

      if (msg.type === 'transcript') {
        appendTurn('user', msg.text);
        setBtnState('thinking');
        setStatus('Thinking…');
      }

      if (msg.type === 'response_text') {
        appendTurn('ai', msg.text);
      }

      if (msg.type === 'tts_done') {
        ignoreAudio = false;  // safe to play audio again
        currentTtsGen = msg.gen;  // store generation so playback_ended can echo it back
        if (!isPlaying) {
          setBtnState('ready');
          setStatus('Mic on — speak anytime');
        }
      }

      if (msg.type === 'barge_in') {
        ignoreAudio = true;   // discard any chunks still arriving from the interrupted response
        stopPlayback();
        setBtnState('listening');
        setStatus('Listening…');
      }

      if (msg.type === 'error') {
        setStatus('Error: ' + msg.message);
        if (micActive) setBtnState('ready');
      }
    } else {
      if (!ignoreAudio) enqueueAudio(event.data);
    }
  };

  // ── Mic state ─────────────────────────────────────────────────────
  let micActive   = false;
  let btnState    = 'idle';

  let _micStream   = null;
  let _workletNode = null;
  let _recCtx      = null;

  // Inline AudioWorklet: float32 → int16 PCM
  const _workletCode = `
    class PCMProcessor extends AudioWorkletProcessor {
      process(inputs) {
        const ch = inputs[0][0];
        if (ch) {
          const int16 = new Int16Array(ch.length);
          for (let i = 0; i < ch.length; i++) {
            int16[i] = Math.max(-32768, Math.min(32767, ch[i] * 32768));
          }
          this.port.postMessage(int16.buffer, [int16.buffer]);
        }
        return true;
      }
    }
    registerProcessor('pcm-processor', PCMProcessor);
  `;
  const _workletBlob = new Blob([_workletCode], { type: 'application/javascript' });
  const _workletUrl  = URL.createObjectURL(_workletBlob);

  async function startMic() {
    try {
      // Echo cancellation + noise suppression so VAD on server isn't
      // triggered by the bot's own TTS audio coming from the speakers
      _micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
        },
      });
      _recCtx = new AudioContext({ sampleRate: 16000 });

      await _recCtx.audioWorklet.addModule(_workletUrl);
      const source = _recCtx.createMediaStreamSource(_micStream);
      _workletNode = new AudioWorkletNode(_recCtx, 'pcm-processor');

      // Send ALL audio continuously — server-side VAD decides what is speech
      _workletNode.port.onmessage = (e) => {
        if (ws.readyState === WebSocket.OPEN) ws.send(e.data);
      };

      source.connect(_workletNode);
      micActive = true;
      setBtnState('ready');
      setStatus('Mic on — speak anytime');
    } catch (err) {
      setStatus('Mic error: ' + err.message);
    }
  }

  function stopMic() {
    if (_workletNode) { _workletNode.port.onmessage = null; _workletNode.disconnect(); }
    if (_micStream)   { _micStream.getTracks().forEach(t => t.stop()); }
    if (_recCtx)      { _recCtx.close(); }
    _micStream = null; _workletNode = null; _recCtx = null;
    micActive = false;
    stopPlayback();
    setBtnState('idle');
    setStatus('Click to start a conversation');
  }

  // ── Toggle button ─────────────────────────────────────────────────
  btn.addEventListener('click', () => {
    if (!micActive) {
      startMic();
    } else {
      stopMic();
    }
  });

  // ── Streaming audio playback ──────────────────────────────────────
  let audioCtx      = null;
  let audioQueue    = [];
  let isPlaying     = false;
  let currentSource = null;   // track active BufferSource for barge-in stopping
  let ignoreAudio   = false;  // true after barge-in until tts_done clears it
  let currentTtsGen = 0;      // echoed back in playback_ended so server can discard stale ones

  function getAudioCtx() {
    if (!audioCtx || audioCtx.state === 'closed') audioCtx = new AudioContext();
    return audioCtx;
  }

  function stopPlayback() {
    audioQueue = [];
    if (currentSource) {
      currentSource.onended = null;  // cancel handler so playNext is never called,
                                     // preventing a spurious playback_ended to the server
      try { currentSource.stop(); } catch (_) {}
      currentSource = null;
    }
    isPlaying = false;
  }

  function enqueueAudio(arrayBuffer) {
    setBtnState('speaking');
    setStatus('Speaking…');
    const ctx = getAudioCtx();
    const samples = new Float32Array(arrayBuffer);
    if (samples.length === 0) return;
    const buffer = ctx.createBuffer(1, samples.length, 44100);
    buffer.copyToChannel(samples, 0);
    audioQueue.push(buffer);
    if (!isPlaying) playNext(ctx);
  }

  function playNext(ctx) {
    if (audioQueue.length === 0) {
      isPlaying = false;
      currentSource = null;
      // Tell server the browser has finished playing — only now is barge-in safe to detect.
      // Echo back currentTtsGen so the server can discard stale playback_ended messages.
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'playback_ended', gen: currentTtsGen }));
      }
      if (micActive) {
        setBtnState('ready');
        setStatus('Mic on — speak anytime');
      }
      return;
    }
    isPlaying = true;
    const source = ctx.createBufferSource();
    source.buffer = audioQueue.shift();
    source.connect(ctx.destination);
    source.start();
    currentSource = source;
    source.onended = () => playNext(ctx);
  }

  // ── Helpers ───────────────────────────────────────────────────────
  function setStatus(text) { statusEl.textContent = text; }

  function setBtnState(state) {
    btnState = state;
    btn.className = (state === 'idle') ? '' : state;
    btn.textContent = {
      idle:      'Start',
      ready:     'Mic On',
      listening: 'Listening…',
      thinking:  'Thinking…',
      speaking:  'Speaking…',
    }[state] ?? 'Mic On';
  }

  function appendTurn(role, text) {
    const div = document.createElement('div');
    div.className = `turn ${role}`;
    div.innerHTML = `<div class="label">${role === 'user' ? 'You' : 'Assistant'}</div>
                     <div class="text">${escapeHtml(text)}</div>`;
    transcriptEl.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

</body>
</html>
